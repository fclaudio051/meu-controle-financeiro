# Arquivo: render.yaml
# Atenção à indentação! Cada nível de recuo deve usar 2 espaços.

services:
  # O hífen '-' indica um item na lista de serviços
  - type: web
    name: meu-controle-financeiro-api
    env: node
    rootDir: ./backend
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: postgresql://meu_controle_financeiro_db_user:v0xmBhB79xKVFnyzAdU4WYXIatnlzgwo@dpg-d26mjumuk2gs73c3m39g-a/meu_controle_financeiro_db
        sync: false
    # O bloco 'ports' deve ter o mesmo recuo que 'envVars'
    ports:
      - port: 3001
        protocol: http

  # Segundo serviço na lista
  - type: web
    name: meu-controle-financeiro-web
    env: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://meu-controle-financeiro-api.onrender.com
